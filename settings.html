<div id="gpo-settings-panel" class="gpo-settings-panel inline-drawer">
    <div class="inline-drawer-toggle inline-drawer-header">
        <b>上下文分析</b>
        <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
    </div>
    <div class="inline-drawer-content">
        <label class="checkbox_label">
            <input id="gpo-enabled-toggle" type="checkbox" />
            <span>显示悬浮按钮</span>
        </label>
        <div class="gpo-settings-actions">
            <button id="gpo-open-manager" class="menu_button">打开面板</button>
            <button id="gpo-refresh-from-settings" class="menu_button">重新读取当前状态</button>
        </div>
        <div class="gpo-settings-note">
            用来查看当前上下文、世界书、角色卡、预设、发送给 AI 的内容，以及各部分的占比和风险提示。
        </div>
    </div>
</div>
