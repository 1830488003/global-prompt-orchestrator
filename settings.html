<div id="gpo-settings-panel" class="gpo-settings-panel inline-drawer">
    <div class="inline-drawer-toggle inline-drawer-header">
        <b>上下文分析</b>
        <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
    </div>
    <div class="inline-drawer-content">
        <label class="checkbox_label">
            <input id="gpo-enabled-toggle" type="checkbox" />
            <span>显示悬浮按钮</span>
        </label>
        <div class="gpo-settings-version">
            <div class="gpo-settings-version-line">
                当前版本：<span id="gpo-current-version">0.0.0</span>
                <span id="gpo-update-indicator" style="display:none; color:#f6c356; margin-left:6px;">发现新版</span>
            </div>
            <div class="gpo-settings-version-line">
                联系方式：
                默默的角色卡QQ群1：118774271
                <br />
                默默的角色卡QQ群2：705941358
            </div>
            <button id="gpo-check-update" class="menu_button">检查更新</button>
            <div id="gpo-update-guide" class="gpo-settings-update-guide" style="display:none;">
                <div class="gpo-settings-update-title">
                    发现新版本 <span id="gpo-new-version-display">0.0.0</span>
                </div>
                <div class="gpo-settings-update-body">
                    点击“检查更新”后会直接调用酒馆扩展更新接口，成功后自动刷新页面。
                </div>
            </div>
        </div>
        <div class="gpo-settings-actions">
            <button id="gpo-open-manager" class="menu_button">打开面板</button>
            <button id="gpo-refresh-from-settings" class="menu_button">重新读取当前状态</button>
        </div>
        <div class="gpo-settings-note">
            用来查看当前上下文、世界书、角色卡、预设、发送给 AI 的内容，以及各部分的占比和风险提示。
        </div>
    </div>
</div>
